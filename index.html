<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="专门用来把一行一号 TXT 卡密转换成 sub2api 可导入 JSON 的本地离线工具。"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231e63da'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' font-family='Arial,sans-serif' font-weight='700' fill='white'%3E转%3C/text%3E%3C/svg%3E"
    />
    <title>sub2api TXT 转 JSON 离线工具</title>
  </head>
  <body>
    <div id="app">
      <main
        style="
          max-width: 760px;
          margin: 80px auto;
          padding: 28px;
          border: 1px solid #d9e1ec;
          border-radius: 8px;
          font-family: 'Microsoft YaHei UI', 'Microsoft YaHei', Arial, sans-serif;
          color: #18212f;
          line-height: 1.7;
        "
      >
        <h1 style="margin: 0 0 12px; font-size: 28px">请打开离线成品文件</h1>
        <p style="margin: 0 0 12px">
          当前这个 <code>index.html</code> 是开发入口，直接双击打开可能无法加载源码模块。
        </p>
        <p style="margin: 0 0 12px">
          普通用户请打开：
          <code>release/sub2api-txt-to-json-offline.html</code>
        </p>
        <p style="margin: 0">
          开发者请在项目目录运行 <code>npm run dev</code>，再用浏览器访问终端里显示的本地地址。
        </p>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
