name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build offline HTML
        run: npm run build:offline

      - name: Upload offline artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-txt-to-json-offline
          path: |
            release/sub2api-txt-to-json-offline.html
            release/SHA256SUMS.txt
